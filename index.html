<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロダクト進捗マンダラ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Hiragino Sans','Noto Sans JP',system-ui,sans-serif;background:#f4f4f2;color:#3a3a3a}
button{font-family:inherit;cursor:pointer}input{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#e2e0dc;border-radius:2px}

:root{
  --bg:#f4f4f2;--surface:#fff;--border:#e2e0dc;--border-lt:#eceae6;--border-strong:#c8c5be;
  --text:#3a3a3a;--text-mid:#6b6b6b;--text-light:#9a9a9a;
  --done-bg:#e8e6e1;--done-tx:#a8a6a0;--bar:#e8e6e2;--bar-fill:#6b6b6b;
  --tag:#eae8e4;--red:#d94040;--red-bg:#fdf2f2;--red-border:#f0c0c0;
  --orange:#d48c1a;--orange-bg:#fdf8f0;--orange-border:#f0ddb0;
  --center-bg:#f7f6f3;--product-bg:#3a3a3a;
}

.app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Tab bar */
.tab-bar{display:flex;align-items:center;background:#eae8e4;border-bottom:1px solid var(--border);padding-left:8px;min-height:34px;flex-shrink:0}
.tab-item{display:flex;align-items:center;gap:6px;padding:0 14px;height:34px;cursor:pointer;
  border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;
  font-size:11px;font-weight:500;color:var(--text-mid);white-space:nowrap}
.tab-item.active{background:var(--surface);border-color:var(--border);font-weight:700;color:var(--text);margin-bottom:-1px}
.tab-pct{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px}
.tab-item.active .tab-pct{background:var(--tag);color:var(--text-mid)}

/* Header */
.header{padding:10px 28px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:#fff;flex-shrink:0}
.header-title{font-size:13px;font-weight:500;color:var(--text-mid);display:flex;align-items:center;gap:10px}
.legend{display:flex;gap:12px;font-size:10px;color:var(--text-mid)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:2px}

.body-row{flex:1;display:flex;min-height:0}
.sidebar{width:60px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;
  border-right:1px solid var(--border);padding:12px 0;gap:3px;align-items:center;overflow-y:auto}
.sb-btn{width:46px;padding:6px 0;border-radius:8px;border:1px solid transparent;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-btn.active{border:1.5px solid var(--text);background:#f7f7f5}
.sb-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;background:var(--tag);color:var(--text-mid)}
.sb-btn.active .sb-avatar{background:var(--text);color:#fff}
.sb-name{font-size:8.5px;color:var(--text-light)}
.sb-btn.active .sb-name{color:var(--text);font-weight:600}

/* Main: mandala stage */
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;min-width:0;min-height:0}
.mandala-wrap{aspect-ratio:1/1;max-width:min(92vh,92vw,1100px);width:100%;height:100%;
  display:flex;align-items:center;justify-content:center}
.mandala{width:100%;height:100%;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:10px;background:transparent}

/* Each big block = 3x3 mini grid */
.block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:4px;
  transition:all 0.3s ease;position:relative}
.block.center{background:var(--center-bg);border:1.5px solid var(--border-strong)}
.block.all-done{background:var(--done-bg);opacity:0.85}

/* Generic cell */
.cell{border-radius:6px;background:#fbfaf8;border:1px solid var(--border-lt);
  display:flex;flex-direction:column;padding:5px 6px;font-size:9px;line-height:1.25;
  overflow:hidden;transition:all 0.2s ease;position:relative;min-width:0}

/* Task cell (in outer blocks) */
.task{cursor:pointer}
.task:hover{border-color:var(--text-mid)}
.task.done{background:var(--done-bg);opacity:0.55}
.task.done .task-name{text-decoration:line-through;color:var(--done-tx)}
.task.overdue{background:var(--red-bg);border-color:var(--red-border)}
.task.soon{background:var(--orange-bg);border-color:var(--orange-border)}
.task.highlighted{border:1.5px solid var(--text)!important;background:#f7f7f5;box-shadow:0 0 0 2px rgba(58,58,58,0.1)}
.task.dimmed{opacity:0.18}
.task-name{font-size:9.5px;font-weight:600;color:var(--text);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.2}
.task-meta{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:2px;
  font-size:8px;color:var(--text-light)}
.task-meta .assignee{font-weight:600;color:var(--text-mid)}
.task.overdue .deadline{color:var(--red);font-weight:700}
.task.soon .deadline{color:var(--orange);font-weight:700}
.task-check{position:absolute;top:3px;right:3px;width:10px;height:10px;border-radius:2px;
  border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:7px;color:var(--text);pointer-events:none}
.task.done .task-check{background:var(--text);color:#fff;border-color:var(--text)}

/* Feature label cell (center of outer block) */
.feat-label{background:var(--text);color:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:none;padding:4px;font-weight:700}
.feat-label .feat-name{font-size:10.5px;text-align:center;line-height:1.2;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.feat-label .feat-pct{font-size:9px;opacity:0.75;margin-top:2px;font-weight:500}

/* Center block: product + 8 features */
.prod-cell{background:var(--product-bg);color:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:none;padding:6px}
.prod-cell .prod-name{font-size:11px;font-weight:700;text-align:center;line-height:1.2;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.prod-cell .prod-pct{font-size:14px;font-weight:800;margin-top:3px}

.feat-cell{background:#fff;border:1px solid var(--border);display:flex;flex-direction:column;
  padding:6px 7px;justify-content:space-between;transition:all 0.4s ease}
.feat-cell .fc-name{font-size:10px;font-weight:700;color:var(--text);line-height:1.2;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.feat-cell .fc-bottom{display:flex;align-items:center;gap:5px;margin-top:4px}
.feat-cell .fc-pct{font-size:9px;font-weight:700;color:var(--text-mid);min-width:24px}
.feat-cell .fc-bar{flex:1;height:3px;background:var(--bar);border-radius:2px;overflow:hidden}
.feat-cell .fc-bar-fill{height:100%;background:var(--bar-fill);transition:width 0.5s ease;border-radius:2px}
.feat-cell.complete{background:var(--done-bg)}
.feat-cell.complete .fc-name{color:var(--done-tx)}

/* Edit panel (right) */
.edit-panel{width:360px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);
  padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.edit-panel h3{font-size:12px;color:var(--text-mid);margin-bottom:4px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.5px}
.edit-row{display:flex;flex-direction:column;gap:3px}
.edit-row label{font-size:10px;color:var(--text-light);font-weight:600}
.edit-row input,.edit-row select{padding:6px 8px;border:1px solid var(--border);
  border-radius:5px;font-size:12px;outline:none;background:#fff}
.edit-row input:focus{border-color:var(--text-mid)}
.edit-panel button.close{align-self:flex-end;background:none;border:none;font-size:16px;color:var(--text-light)}
.del-btn{padding:7px 12px;background:#fff;border:1px solid var(--red-border);border-radius:5px;
  color:var(--red);font-size:11px;font-weight:600;margin-top:6px}

.btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;
  color:var(--text-mid);font-size:10px;font-weight:600}
.btn.primary{background:var(--text);border-color:var(--text);color:#fff}

/* Save status */
.save-indicator{display:flex;align-items:center;gap:5px;font-size:9.5px;font-weight:500;
  padding:3px 10px;border-radius:12px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-indicator.saved{color:#5a8c5c;background:#f0f8f0}
.save-indicator.saving{color:var(--orange);background:var(--orange-bg)}
.save-indicator.error{color:var(--red);background:var(--red-bg);cursor:pointer}
.save-indicator.offline{color:var(--text-light);background:var(--tag)}
.save-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.save-indicator.saved .save-dot{background:#5a8c5c}
.save-indicator.saving .save-dot{background:var(--orange);animation:pulse 1s infinite}
.save-indicator.error .save-dot{background:var(--red)}
.save-indicator.offline .save-dot{background:var(--text-light)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Setup overlay */
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);
  display:flex;align-items:center;justify-content:center;z-index:200}
.setup-card{background:#fff;border-radius:12px;padding:32px;max-width:560px;width:90%;
  box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:90vh;overflow-y:auto}
.setup-card h2{font-size:18px;margin-bottom:16px}
.setup-card .step{margin-bottom:12px;font-size:12px;line-height:1.8;color:var(--text-mid)}
.setup-card .step b{color:var(--text)}
.setup-card code{background:#eae8e4;padding:1px 5px;border-radius:3px;font-size:11px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════
//  プロダクト進捗マンダラ — Mandala Chart Visualization
//  Center 3x3 block: product name + 8 features
//  8 outer 3x3 blocks: 8 tasks per feature
//  Completing tasks fills the corresponding feature cell
// ═══════════════════════════════════════════════════════

const NOW = new Date();
const DAY = 86400000;

// ── Sample data ──

        mkTask("ログ監視","鈴木","04/30",false),

// ═══ State ═══
const S = {
  projects: JSON.parse(JSON.stringify(SAMPLE)),
  activeProjectId: "p1",
  selectedHolder: null,
  editTaskId: null,
  editFeatId: null,
  // ── Google Sheets connection ──
  gasUrl: localStorage.getItem("mandalaGasUrl") || "",
  saveStatus: localStorage.getItem("mandalaGasUrl") ? "saving" : "offline",
  lastSaved: null,
  lastError: "",
  showSetup: false,
};
let _gasConnected = false;
let saveTimer = null;

function setState(u){Object.assign(S,u);render();}
function activeProject(){return S.projects.find(p=>p.id===S.activeProjectId)||S.projects[0];}

// ═══ Data conversion (project ↔ spreadsheet rows) ═══
// Schema: プロジェクト, 機能, タスクID, タスク名, 担当者, 締切, 完了
function projectsToRows(projects){
  const rows=[];
  projects.forEach(p=>{
    p.features.forEach(f=>{
      f.tasks.forEach(t=>{
        rows.push({
          "プロジェクト": p.productName,
          "機能": f.name,
          "タスクID": t.id,
          "タスク名": t.name,
          "担当者": t.assignee||"",
          "締切": t.deadline||"",
          "完了": t.done?"TRUE":"FALSE",
        });
      });
    });
  });
  return rows;
}
function rowsToProjects(rows){
  const pMap={};const pOrder=[];
  for(const row of rows){
    const pName=(row["プロジェクト"]||"").trim();if(!pName)continue;
    const fName=(row["機能"]||"").trim();if(!fName)continue;
    if(!pMap[pName]){
      pMap[pName]={id:"p_"+Math.random().toString(36).slice(2,7),productName:pName,features:[],_fMap:{}};
      pOrder.push(pName);
    }
    const p=pMap[pName];
    if(!p._fMap[fName]){
      const f={id:"f_"+Math.random().toString(36).slice(2,7),name:fName,tasks:[]};
      p._fMap[fName]=f;p.features.push(f);
    }
    p._fMap[fName].tasks.push({
      id:(row["タスクID"]||"").trim()||"t_"+Math.random().toString(36).slice(2,7),
      name:(row["タスク名"]||"").trim(),
      assignee:(row["担当者"]||"").trim(),
      deadline:(row["締切"]||"").trim(),
      done:(row["完了"]||"").trim().toUpperCase()==="TRUE",
    });
  }
  const result=pOrder.map(n=>{const p=pMap[n];delete p._fMap;return p;});
  return result.length>0?result:null;
}

// ═══ Google Sheets API ═══
// JSONP for GET (bypasses CORS, works from file://)
function gasGetJsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="_mandalaCb_"+Date.now();
    const sep=url.includes("?")?"&":"?";
    const script=document.createElement("script");
    const cleanup=()=>{delete window[cb];script.remove();};
    const timer=setTimeout(()=>{cleanup();reject(new Error("タイムアウト（10秒）"));},10000);
    window[cb]=(data)=>{clearTimeout(timer);cleanup();resolve(data);};
    script.onerror=()=>{clearTimeout(timer);cleanup();reject(new Error("スクリプト読み込み失敗"));};
    script.src=url+sep+"callback="+cb;
    document.body.appendChild(script);
  });
}
async function gasFetchGet(url){
  const resp=await fetch(url,{method:"GET",redirect:"follow"});
  const text=await resp.text();let json;
  try{json=JSON.parse(text);}catch{const m=text.match(/\{[\s\S]*\}/);if(m){try{json=JSON.parse(m[0]);}catch{}}}
  if(!json)throw new Error("レスポンス解析失敗（デプロイを確認）");
  if(!json.success)throw new Error(json.error||"GAS側エラー");
  return json;
}
async function gasFetchPost(url,body){
  const resp=await fetch(url,{method:"POST",redirect:"follow",body:JSON.stringify(body)});
  const text=await resp.text();let json;
  try{json=JSON.parse(text);}catch{const m=text.match(/\{[\s\S]*\}/);if(m){try{json=JSON.parse(m[0]);}catch{}}}
  if(!json)throw new Error("レスポンス解析失敗（デプロイを確認）");
  if(!json.success)throw new Error(json.error||"GAS側エラー");
  return json;
}
async function gasGet(url){
  try{return await gasGetJsonp(url);}
  catch(e){console.warn("JSONP failed, fallback to fetch:",e.message);return await gasFetchGet(url);}
}

async function loadFromSheet(silent){
  if(!S.gasUrl){setState({saveStatus:"offline"});return;}
  try{
    setState({saveStatus:"saving",lastError:""});
    const data=await gasGet(S.gasUrl);
    _gasConnected=true;
    if(data.rows&&data.rows.length>0){
      const loaded=rowsToProjects(data.rows);
      if(loaded&&loaded.length>0){
        S.projects=loaded;
        if(!S.projects.find(p=>p.id===S.activeProjectId))S.activeProjectId=S.projects[0].id;
      }
    }
    setState({saveStatus:"saved",lastSaved:new Date(),lastError:""});
  }catch(e){
    console.error("Load error:",e);
    if(silent){setState({saveStatus:"offline",lastError:""});}
    else{setState({saveStatus:"error",lastError:"読込失敗: "+e.message});}
  }
}
async function saveToSheet(){
  if(!S.gasUrl){S.saveStatus="offline";return;}
  const rows=projectsToRows(S.projects);
  try{
    S.saveStatus="saving";S.lastError="";
    await gasFetchPost(S.gasUrl,{rows});
    _gasConnected=true;
    setState({saveStatus:"saved",lastSaved:new Date(),lastError:""});
  }catch(e){
    console.error("Save error:",e);
    setState({saveStatus:"error",lastError:"保存失敗: "+e.message});
  }
}
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  if(!S.gasUrl)return;
  S.saveStatus="saving";
  saveTimer=setTimeout(()=>saveToSheet(),1500);
}

// ── Helpers ──
function parseDeadline(dl){
  if(!dl)return null;
  const p=dl.split("/").map(Number);
  if(p.length===2)return new Date(NOW.getFullYear(),p[0]-1,p[1],23,59,59);
  if(p.length===3)return new Date(p[0],p[1]-1,p[2],23,59,59);
  return null;
}
function deadlineClass(t){
  if(t.done)return "done";
  const dt=parseDeadline(t.deadline);if(!dt)return "";
  const d=dt.getTime()-NOW.getTime();
  if(d<0)return "overdue";
  if(d<7*DAY)return "soon";
  return "";
}
function featPct(f){
  const total=f.tasks.length;
  const done=f.tasks.filter(t=>t.done).length;
  return {total,done,pct:total?Math.round(done/total*100):0};
}
function projectPct(p){
  let total=0,done=0;
  p.features.forEach(f=>{total+=f.tasks.length;done+=f.tasks.filter(t=>t.done).length;});
  return total?Math.round(done/total*100):0;
}
function allStakeholders(p){
  const s=new Set();
  p.features.forEach(f=>f.tasks.forEach(t=>t.assignee&&s.add(t.assignee)));
  return [...s];
}

// ── DOM helper ──
function h(tag,props,...kids){
  const el=document.createElement(tag);
  if(props)for(const k in props){
    if(k==="className")el.className=props[k];
    else if(k==="style"&&typeof props[k]==="object")Object.assign(el.style,props[k]);
    else if(k==="innerHTML")el.innerHTML=props[k];
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),props[k]);
    else if(props[k]!=null)el.setAttribute(k,props[k]);
  }
  kids.flat().forEach(k=>{
    if(k==null||k===false)return;
    el.appendChild(typeof k==="string"||typeof k==="number"?document.createTextNode(k):k);
  });
  return el;
}

// ── Mutations (all trigger auto-save) ──
function toggleTask(taskId){
  const ap=activeProject();
  ap.features.forEach(f=>f.tasks.forEach(t=>{if(t.id===taskId)t.done=!t.done;}));
  scheduleSave();render();
}
function updateTask(taskId,patch){
  const ap=activeProject();
  ap.features.forEach(f=>f.tasks.forEach(t=>{if(t.id===taskId)Object.assign(t,patch);}));
  scheduleSave();render();
}
function updateFeat(featId,patch){
  const ap=activeProject();
  ap.features.forEach(f=>{if(f.id===featId)Object.assign(f,patch);});
  scheduleSave();render();
}
function updateProductName(name){
  const ap=activeProject();ap.productName=name;
  scheduleSave();render();
}
function findTask(id){
  const ap=activeProject();
  for(const f of ap.features)for(const t of f.tasks)if(t.id===id)return{task:t,feat:f};
  return null;
}

// ═══ Render ═══
function renderTabBar(){
  const bar=h("div",{className:"tab-bar"});
  S.projects.forEach(p=>{
    const pct=projectPct(p);
    bar.appendChild(h("div",{
      className:"tab-item"+(p.id===S.activeProjectId?" active":""),
      onClick:()=>setState({activeProjectId:p.id,selectedHolder:null,editTaskId:null,editFeatId:null})
    },p.productName,h("span",{className:"tab-pct"},pct+"%")));
  });
  return bar;
}

function renderSidebar(){
  const sb=h("div",{className:"sidebar"});
  const ap=activeProject();
  const list=allStakeholders(ap);
  sb.appendChild(h("button",{
    className:"sb-btn"+(!S.selectedHolder?" active":""),
    onClick:()=>setState({selectedHolder:null})
  },h("div",{className:"sb-avatar"},"ALL")));
  list.forEach(name=>{
    const tasks=ap.features.flatMap(f=>f.tasks).filter(t=>t.assignee===name);
    const done=tasks.filter(t=>t.done).length;
    sb.appendChild(h("button",{
      className:"sb-btn"+(S.selectedHolder===name?" active":""),
      onClick:()=>setState({selectedHolder:S.selectedHolder===name?null:name})
    },
      h("div",{className:"sb-avatar"},name.slice(0,2)),
      h("div",{className:"sb-name"},done+"/"+tasks.length)
    ));
  });
  return sb;
}

// Render the center 3x3 block (product + 8 features)
function renderCenterBlock(ap){
  const blk=h("div",{className:"block center"});
  // Row by row, col by col: positions 0-8, center=4
  // feature[0..7] map to positions [0,1,2,3,5,6,7,8]
  const posToFeatIdx=[0,1,2,3,null,4,5,6,7];
  for(let i=0;i<9;i++){
    if(i===4){
      // Product cell
      const pct=projectPct(ap);
      blk.appendChild(h("div",{className:"cell prod-cell"},
        h("div",{className:"prod-name"},ap.productName),
        h("div",{className:"prod-pct"},pct+"%")
      ));
    }else{
      const fi=posToFeatIdx[i];
      const f=ap.features[fi];
      if(!f)continue;
      const {pct,done,total}=featPct(f);
      blk.appendChild(h("div",{
        className:"cell feat-cell"+(done===total?" complete":""),
        onClick:()=>setState({editFeatId:f.id,editTaskId:null}),
        style:{cursor:"pointer"}
      },
        h("div",{className:"fc-name"},f.name),
        h("div",{className:"fc-bottom"},
          h("div",{className:"fc-pct"},pct+"%"),
          h("div",{className:"fc-bar"},h("div",{className:"fc-bar-fill",style:{width:pct+"%"}}))
        )
      ));
    }
  }
  return blk;
}

// Render an outer block: 8 tasks + 1 feature-label in center
function renderOuterBlock(feat){
  const {done,total}=featPct(feat);
  const blk=h("div",{className:"block"+(done===total?" all-done":"")});
  const posToTaskIdx=[0,1,2,3,null,4,5,6,7];
  for(let i=0;i<9;i++){
    if(i===4){
      const pct=total?Math.round(done/total*100):0;
      blk.appendChild(h("div",{className:"cell feat-label"},
        h("div",{className:"feat-name"},feat.name),
        h("div",{className:"feat-pct"},done+"/"+total)
      ));
    }else{
      const ti=posToTaskIdx[i];
      const t=feat.tasks[ti];
      if(!t){blk.appendChild(h("div",{className:"cell"}));continue;}
      const cls=deadlineClass(t);
      const highlighted=S.selectedHolder&&t.assignee===S.selectedHolder;
      const dimmed=S.selectedHolder&&t.assignee!==S.selectedHolder;
      blk.appendChild(h("div",{
        className:"cell task "+(t.done?"done ":"")+cls+(highlighted?" highlighted":"")+(dimmed?" dimmed":""),
        onClick:(e)=>{
          if(e.shiftKey){toggleTask(t.id);return;}
          setState({editTaskId:t.id,editFeatId:null});
        },
        title:"クリック: 編集 / Shift+クリック: 完了切替"
      },
        h("div",{className:"task-check"},t.done?"✓":""),
        h("div",{className:"task-name"},t.name),
        h("div",{className:"task-meta"},
          h("span",{className:"assignee"},t.assignee||""),
          h("span",{className:"deadline"},t.deadline||"")
        )
      ));
    }
  }
  return blk;
}

function renderMandala(ap){
  // 3x3 of blocks; center = center-block, 8 around = outer blocks for features[0..7]
  // Mapping: blockPos [0..8], center=4
  // features[0..7] → block positions [0,1,2,3,5,6,7,8]
  const m=h("div",{className:"mandala"});
  const posToFeatIdx=[0,1,2,3,null,4,5,6,7];
  for(let i=0;i<9;i++){
    if(i===4){m.appendChild(renderCenterBlock(ap));}
    else{
      const fi=posToFeatIdx[i];
      const f=ap.features[fi];
      if(!f){m.appendChild(h("div",{className:"block"}));continue;}
      m.appendChild(renderOuterBlock(f));
    }
  }
  return m;
}

function renderEditPanel(){
  if(!S.editTaskId&&!S.editFeatId)return null;
  const panel=h("div",{className:"edit-panel"});
  panel.appendChild(h("button",{className:"close",
    onClick:()=>setState({editTaskId:null,editFeatId:null})},"×"));
  if(S.editTaskId){
    const found=findTask(S.editTaskId);
    if(!found){setState({editTaskId:null});return null;}
    const {task:t,feat:f}=found;
    panel.appendChild(h("h3",{},"タスク編集"));
    panel.appendChild(h("div",{style:{fontSize:"11px",color:"var(--text-light)",marginBottom:"8px"}},
      "所属: "+f.name));
    const mk=(label,key,type)=>{
      const row=h("div",{className:"edit-row"});
      row.appendChild(h("label",{},label));
      const inp=h("input",{type:type||"text",value:t[key]||""});
      inp.addEventListener("input",e=>updateTask(t.id,{[key]:e.target.value}));
      row.appendChild(inp);
      return row;
    };
    panel.appendChild(mk("タスク名","name"));
    panel.appendChild(mk("担当者","assignee"));
    panel.appendChild(mk("締切 (MM/DD)","deadline"));
    const doneRow=h("div",{className:"edit-row"});
    doneRow.appendChild(h("label",{},"ステータス"));
    const btn=h("button",{className:"btn"+(t.done?" primary":""),
      onClick:()=>toggleTask(t.id)},t.done?"✓ 完了済み":"未完了");
    doneRow.appendChild(btn);
    panel.appendChild(doneRow);
  }else if(S.editFeatId){
    const ap=activeProject();
    const f=ap.features.find(x=>x.id===S.editFeatId);
    if(!f){setState({editFeatId:null});return null;}
    const {done,total,pct}=featPct(f);
    panel.appendChild(h("h3",{},"機能編集"));
    const row=h("div",{className:"edit-row"});
    row.appendChild(h("label",{},"機能名"));
    const inp=h("input",{value:f.name});
    inp.addEventListener("input",e=>updateFeat(f.id,{name:e.target.value}));
    row.appendChild(inp);
    panel.appendChild(row);
    panel.appendChild(h("div",{style:{padding:"10px 12px",background:"var(--tag)",borderRadius:"6px",
      fontSize:"11px",color:"var(--text-mid)"}},
      "進捗: "+done+"/"+total+" タスク完了 ("+pct+"%)"));
    panel.appendChild(h("h3",{style:{marginTop:"10px"}},"タスク一覧"));
    f.tasks.forEach((t,idx)=>{
      const taskRow=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 8px",
        background:t.done?"var(--done-bg)":"#fbfaf8",borderRadius:"5px",fontSize:"11px",cursor:"pointer"},
        onClick:()=>setState({editTaskId:t.id,editFeatId:null})},
        h("span",{style:{width:"16px",height:"16px",borderRadius:"3px",border:"1px solid var(--border)",
          background:t.done?"var(--text)":"#fff",color:"#fff",display:"flex",alignItems:"center",
          justifyContent:"center",fontSize:"10px",flexShrink:"0"},
          onClick:(e)=>{e.stopPropagation();toggleTask(t.id);}},t.done?"✓":""),
        h("span",{style:{flex:"1",textDecoration:t.done?"line-through":"none",color:t.done?"var(--done-tx)":"var(--text)"}},
          (idx+1)+". "+t.name),
        h("span",{style:{fontSize:"9.5px",color:"var(--text-light)"}},t.assignee),
      );
      panel.appendChild(taskRow);
    });
  }
  return panel;
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const container=h("div",{className:"app"});
  container.appendChild(renderTabBar());
  const ap=activeProject();
  // Header
  const saveLabel={saved:"保存済み",saving:"同期中...",error:"保存エラー",offline:"ローカルのみ"};
  container.appendChild(h("div",{className:"header"},
    h("div",{className:"header-title"},
      h("div",{style:{width:"24px",height:"24px",borderRadius:"5px",background:"var(--tag)",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",color:"var(--text-mid)"}},"⊞"),
      "プロダクト進捗マンダラ",
      h("div",{className:"save-indicator "+S.saveStatus,
        title:S.lastError||"",
        onClick:()=>{if(S.saveStatus==="error")setState({showSetup:true});}},
        h("span",{className:"save-dot"}),
        S.saveStatus==="error"&&S.lastError?S.lastError:(saveLabel[S.saveStatus]||"")
      )
    ),
    h("div",{className:"legend"},
      h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:"var(--red)"}}),"期限超過"),
      h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:"var(--orange)"}}),"1週間以内"),
      h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:"var(--done-bg)",border:"1px solid var(--border)"}}),"完了"),
      S.selectedHolder?h("span",{style:{marginLeft:"10px",padding:"3px 10px",background:"var(--tag)",
        borderRadius:"12px",fontSize:"10px",fontWeight:"600"}},S.selectedHolder+" のタスク"):null,
      h("button",{className:"btn",style:{marginLeft:"10px"},
        onClick:()=>setState({showSetup:true})},"⚙ 設定"),
    )
  ));
  // Body row
  const body=h("div",{className:"body-row"});
  body.appendChild(renderSidebar());
  const stage=h("div",{className:"stage"});
  const wrap=h("div",{className:"mandala-wrap"});
  wrap.appendChild(renderMandala(ap));
  stage.appendChild(wrap);
  body.appendChild(stage);
  const ep=renderEditPanel();
  if(ep)body.appendChild(ep);
  container.appendChild(body);
  app.appendChild(container);
  const so=renderSetupOverlay();
  if(so)app.appendChild(so);
}

function renderSetupOverlay(){
  if(!S.showSetup)return null;
  const card=h("div",{className:"setup-card"});
  card.appendChild(h("h2",{},"⚙ スプレッドシート接続設定"));
  card.appendChild(h("div",{className:"step",innerHTML:`
    <b>ステップ1:</b> 新しい Google スプレッドシートを作成<br>
    <b>ステップ2:</b> <b>拡張機能 → Apps Script</b> を開く<br>
    <b>ステップ3:</b> 配布した <code>google-apps-script-mandala.js</code> の中身を貼り付けて保存<br>
    <b>ステップ4:</b> <code>setupMandalaSheet</code> 関数を一度実行 → ヘッダーが自動生成される<br>
    <b>ステップ5:</b> <b>デプロイ → 新しいデプロイ</b> → 種類: <code>ウェブアプリ</code><br>
    &nbsp;&nbsp;&nbsp;&nbsp;・アクセスできるユーザー: <b>全員</b><br>
    &nbsp;&nbsp;&nbsp;&nbsp;・実行するユーザー: <b>自分</b><br>
    <b>ステップ6:</b> ウェブアプリURLを下に貼り付け<br><br>
    ⚠ スクリプトを更新した場合は必ず <b>「新しいデプロイ」</b> を作成してください
  `}));
  const urlRow=h("div",{style:{display:"flex",gap:"8px",marginTop:"16px"}});
  const urlInp=h("input",{type:"text",value:S.gasUrl,placeholder:"ウェブアプリURLを貼り付け...",
    style:{flex:"1",fontSize:"13px",padding:"10px 12px",border:"1px solid var(--border)",borderRadius:"6px",outline:"none"}});
  urlInp.addEventListener("input",e=>{S.gasUrl=e.target.value;});
  urlRow.appendChild(urlInp);
  urlRow.appendChild(h("button",{
    onClick:()=>{
      localStorage.setItem("mandalaGasUrl",S.gasUrl);
      setState({showSetup:false});
      if(S.gasUrl)loadFromSheet(false);
    },
    style:{padding:"10px 20px",borderRadius:"8px",border:"none",background:"var(--text)",
      color:"#fff",fontSize:"12px",fontWeight:"600",whiteSpace:"nowrap"}
  },"接続する"));
  card.appendChild(urlRow);
  if(S.lastError){
    card.appendChild(h("div",{style:{marginTop:"10px",padding:"8px 12px",borderRadius:"6px",
      background:"var(--red-bg)",border:"1px solid var(--red-border)",fontSize:"11px",color:"var(--red)"}},
      "⚠ "+S.lastError));
  }
  if(_gasConnected){
    card.appendChild(h("div",{style:{marginTop:"10px",padding:"8px 12px",borderRadius:"6px",
      background:"#f0f8f0",border:"1px solid #c0e0c0",fontSize:"11px",color:"#5a8c5c"}},
      "✓ 接続済み"+(S.lastSaved?"（最終同期: "+S.lastSaved.toLocaleTimeString("ja-JP")+"）":"")));
  }
  card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"14px"}},
    h("button",{onClick:()=>setState({showSetup:false}),
      style:{background:"none",border:"none",color:"var(--text-light)",fontSize:"11px",cursor:"pointer"}},
      "スキップ（ローカルのみで使う）"),
    h("button",{onClick:()=>{
      S.gasUrl="";localStorage.removeItem("mandalaGasUrl");
      _gasConnected=false;
      setState({showSetup:false,saveStatus:"offline",lastError:""});
    },style:{background:"none",border:"none",color:"var(--red)",fontSize:"11px",cursor:"pointer"}},
      "接続を解除"),
  ));
  return h("div",{className:"setup-overlay"},card);
}

render();
if(S.gasUrl)loadFromSheet(true); // silent on initial load
</script>
