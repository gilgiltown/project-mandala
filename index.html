<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロダクト進捗マンダラ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Hiragino Sans','Noto Sans JP',system-ui,sans-serif;background:#f4f4f2;color:#3a3a3a}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#e2e0dc;border-radius:2px}

:root{
  --bg:#f4f4f2;--surface:#fff;--border:#e2e0dc;--border-lt:#eceae6;--border-strong:#c8c5be;
  --text:#3a3a3a;--text-mid:#6b6b6b;--text-light:#9a9a9a;
  --done-bg:#e8e6e1;--done-tx:#a8a6a0;--bar:#e8e6e2;--bar-fill:#6b6b6b;
  --tag:#eae8e4;--red:#d94040;--red-bg:#fff0f0;--red-border:#f5b8b8;
  --yellow:#b08800;--yellow-bg:#fffbe6;--yellow-border:#f0dc80;
  --center-bg:#f7f6f3;--product-bg:#3a3a3a;--green:#5a8c5c;
}
.app{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Tab bar */
.tab-bar{display:flex;align-items:center;background:#eae8e4;border-bottom:1px solid var(--border);padding-left:8px;min-height:34px;flex-shrink:0}
.tab-item{display:flex;align-items:center;gap:6px;padding:0 14px;height:34px;cursor:pointer;
  border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;
  font-size:11px;font-weight:500;color:var(--text-mid);white-space:nowrap}
.tab-item.active{background:var(--surface);border-color:var(--border);font-weight:700;color:var(--text);margin-bottom:-1px}
.tab-pct{font-size:9px;font-weight:600;padding:1px 5px;border-radius:8px}
.tab-item.active .tab-pct{background:var(--tag);color:var(--text-mid)}
.tab-rename{font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:4px;padding:2px 6px;outline:none;width:160px;background:#fff}
.tab-add{padding:0 12px;height:34px;background:none;border:none;color:var(--text-light);font-size:15px;cursor:pointer;font-weight:400;letter-spacing:-0.5px;white-space:nowrap}
.tab-add:hover{color:var(--text-mid)}

/* Header + project info bar */
.header{padding:8px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0;gap:12px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;color:var(--text-mid)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.legend{display:flex;gap:10px;font-size:9.5px;color:var(--text-mid)}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:7px;height:7px;border-radius:2px}
.project-info{padding:6px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border-lt);background:#faf9f7;flex-shrink:0;flex-wrap:wrap;min-height:36px}
.pi-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-mid)}
.pi-label{font-weight:700;color:var(--text)}
.pi-val{font-weight:500}
.pi-edit{padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:10.5px;outline:none;background:#fff;min-width:60px}
.pi-edit:focus{border-color:var(--text-mid)}
.pi-add{background:none;border:1px dashed var(--border);border-radius:4px;padding:2px 8px;font-size:10px;color:var(--text-light);cursor:pointer}
.pi-add:hover{border-color:var(--text-mid);color:var(--text-mid)}
.pi-remove{background:none;border:none;color:var(--text-light);font-size:10px;cursor:pointer;padding:0 2px}
.pi-remove:hover{color:var(--red)}

.body-row{flex:1;display:flex;min-height:0}
/* Sidebar */
.sidebar{width:60px;flex-shrink:0;display:flex;flex-direction:column;background:#fff;
  border-right:1px solid var(--border);padding:10px 0 6px;gap:3px;align-items:center;overflow-y:auto}
.sb-btn{width:46px;padding:5px 0;border-radius:8px;border:1px solid transparent;background:transparent;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-btn.active{border:1.5px solid var(--text);background:#f7f7f5}
.sb-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:700;background:var(--tag);color:var(--text-mid)}
.sb-btn.active .sb-avatar{background:var(--text);color:#fff}
.sb-name{font-size:8px;color:var(--text-light)}
.sb-btn.active .sb-name{color:var(--text);font-weight:600}
.sb-add{width:30px;height:30px;border-radius:50%;border:1px dashed var(--border);background:none;
  color:var(--text-light);font-size:14px;display:flex;align-items:center;justify-content:center;margin-top:4px}
.sb-add:hover{border-color:var(--text-mid);color:var(--text-mid)}
/* Empty cell — clickable to add task */
.cell-empty{cursor:pointer;background:#fafaf8}
.cell-empty:hover{background:#f0efe9;border-color:var(--border-strong)}
.cell-empty::after{content:"+";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:18px;font-weight:300;color:var(--border-strong);pointer-events:none;transition:color 0.15s}
.cell-empty:hover::after{color:var(--text-mid)}

/* Member edit */
.sb-btn{position:relative}
.sb-edit-btn{position:absolute;top:1px;right:1px;width:14px;height:14px;border:none;background:rgba(255,255,255,0.92);
  border-radius:3px;font-size:8px;cursor:pointer;display:none;padding:0;line-height:14px;text-align:center;
  color:var(--text-mid);z-index:10}
.sb-btn:hover .sb-edit-btn{display:block}
.sb-edit-btn:hover{background:#fff;color:var(--text)}
.sb-rename-wrap{width:52px;padding:3px 3px 2px;display:flex;flex-direction:column;align-items:center;gap:2px}
.sb-rename{width:100%;font-size:9px;border:1px solid var(--border-strong);border-radius:4px;padding:2px 4px;outline:none;text-align:center;background:#fff}
.sb-rename:focus{border-color:var(--text-mid)}
.sb-rename-hint{font-size:7px;color:var(--text-light)}

/* Mandala — landscape fill */
.stage{flex:1;display:flex;align-items:stretch;padding:10px 12px;min-width:0;min-height:0;overflow:hidden}
.mandala-wrap{flex:1;display:flex;min-width:0;min-height:0}
.mandala{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:7px;min-width:0;min-height:0}

.block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:3px;position:relative;min-width:0;min-height:0}
.block.center{background:var(--center-bg);border:1.5px solid var(--border-strong)}
.block.all-done{background:var(--done-bg);opacity:0.85}

.cell{border-radius:6px;background:#fbfaf8;border:1px solid var(--border-lt);
  display:flex;flex-direction:column;padding:5px 7px;line-height:1.3;
  overflow:hidden;position:relative;min-width:0;min-height:0}

/* Task cell */
.task{cursor:pointer}
.task:hover{border-color:var(--text-mid)}
.task.done{background:var(--done-bg);opacity:0.5}
.task.done .task-name{text-decoration:line-through;color:var(--done-tx)}
.task.urgent{background:var(--red-bg);border-color:var(--red-border)}
.task.soon{background:var(--yellow-bg);border-color:var(--yellow-border)}
.task.highlighted{border:1.5px solid var(--text)!important;background:#f7f7f5;box-shadow:0 0 0 2px rgba(58,58,58,0.08)}
.task.dimmed{opacity:0.15}
.task-name{font-size:11px;font-weight:600;color:var(--text);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.3}
.task-meta{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:2px;font-size:9px;color:var(--text-light);white-space:nowrap;overflow:hidden;gap:4px}
.task-meta .assignee{font-weight:600;color:var(--text-mid);overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0}
.task-meta .deadline{flex-shrink:0;font-size:8.5px}
.task.urgent .deadline{color:var(--red);font-weight:700}
.task.soon .deadline{color:var(--yellow);font-weight:700}
/* Checkbox */
.task-check{position:absolute;top:4px;left:4px;width:14px;height:14px;border-radius:3px;
  border:1.5px solid var(--border-strong);background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:transparent;cursor:pointer;z-index:5;transition:all 0.15s ease}
.task-check:hover{border-color:var(--text);background:var(--tag)}
.task.done .task-check{background:var(--text);color:#fff;border-color:var(--text)}

/* Feature label (center of outer block) */
.feat-label{background:var(--text);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;padding:4px;font-weight:700}
.feat-label .feat-name{font-size:12px;text-align:center;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.feat-label .feat-pct{font-size:10px;opacity:0.75;margin-top:2px;font-weight:500}

/* Center block */
.prod-cell{background:var(--product-bg);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;border:none;padding:6px;cursor:pointer}
.prod-cell:hover{opacity:0.9}
.prod-cell .prod-name{font-size:12px;font-weight:700;text-align:center;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.prod-cell .prod-pct{font-size:17px;font-weight:800;margin-top:3px}
.feat-cell{background:#fff;border:1px solid var(--border);display:flex;flex-direction:column;padding:6px 8px;justify-content:space-between;cursor:pointer}
.feat-cell:hover{border-color:var(--text-mid)}
.feat-cell .fc-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.feat-cell .fc-bottom{display:flex;align-items:center;gap:4px;margin-top:4px}
.feat-cell .fc-pct{font-size:9.5px;font-weight:700;color:var(--text-mid);min-width:26px}
.feat-cell .fc-bar{flex:1;height:3px;background:var(--bar);border-radius:2px;overflow:hidden}
.feat-cell .fc-bar-fill{height:100%;background:var(--bar-fill);border-radius:2px}
.feat-cell.complete{background:var(--done-bg)}.feat-cell.complete .fc-name{color:var(--done-tx)}

/* Edit panel — always visible */
.edit-panel{width:300px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.edit-panel-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:var(--text-light);font-size:11px;text-align:center;padding:20px}
.edit-panel-empty .ep-icon{font-size:28px;opacity:0.3}
.edit-panel h3{font-size:11px;color:var(--text-mid);margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.edit-row{display:flex;flex-direction:column;gap:2px}
.edit-row label{font-size:9.5px;color:var(--text-light);font-weight:600}
.edit-row input,.edit-row select{padding:5px 7px;border:1px solid var(--border);border-radius:5px;font-size:11.5px;outline:none;background:#fff}
.edit-row input:focus,.edit-row select:focus{border-color:var(--text-mid)}
.edit-panel button.close{align-self:flex-end;background:none;border:none;font-size:16px;color:var(--text-light)}
.btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:#fff;color:var(--text-mid);font-size:10px;font-weight:600}
.btn.primary{background:var(--text);border-color:var(--text);color:#fff}

/* Save status */
.save-indicator{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:500;padding:2px 8px;border-radius:10px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-indicator.saved{color:var(--green);background:#f0f8f0}
.save-indicator.saving{color:var(--orange);background:var(--orange-bg)}
.save-indicator.error{color:var(--red);background:var(--red-bg);cursor:pointer}
.save-indicator.offline{color:var(--text-light);background:var(--tag)}
.save-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.save-indicator.saved .save-dot{background:var(--green)}
.save-indicator.saving .save-dot{background:var(--orange);animation:pulse 1s infinite}
.save-indicator.error .save-dot{background:var(--red)}
.save-indicator.offline .save-dot{background:var(--text-light)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Dashboard ── */
.dash{flex:1;overflow-y:auto;padding:20px 28px;background:var(--bg);display:flex;flex-direction:column;gap:28px}
.dash-section{}
.dash-section-title{font-size:11px;font-weight:700;color:var(--text);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.proj-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:opacity 0.2s}
.proj-card.proj-hidden{opacity:0.35}
.proj-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px}
.proj-card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;cursor:pointer}
.proj-card-name:hover{color:var(--text-mid)}
.proj-hide-btn{flex-shrink:0;border:none;background:var(--tag);color:var(--text-light);font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:10px;cursor:pointer;white-space:nowrap;margin-top:2px}
.proj-hide-btn:hover{background:var(--border);color:var(--text-mid)}
.proj-pct-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.proj-pct-num{font-size:18px;font-weight:800;color:var(--text);min-width:44px}
.proj-pbar{flex:1;height:7px;background:var(--bar);border-radius:4px;overflow:hidden}
.proj-pbar-fill{height:100%;border-radius:4px;background:var(--bar-fill)}
.proj-meta{display:flex;gap:10px;font-size:9.5px;color:var(--text-mid);flex-wrap:wrap}
.proj-badge{padding:2px 7px;border-radius:8px;font-weight:600;font-size:9px}
.badge-urgent{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-soon{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
.badge-done{background:#f0f8f0;color:var(--green)}

/* Member bars */
.member-table{display:flex;flex-direction:column;gap:8px}
.member-row{display:flex;align-items:center;gap:10px}
.member-label{width:52px;font-size:10.5px;font-weight:600;color:var(--text);text-align:right;flex-shrink:0}
.member-bar-wrap{flex:1;height:16px;background:var(--bar);border-radius:5px;overflow:hidden;display:flex}
.mbar-done{background:#b8b5af;height:100%}
.mbar-normal{background:#dbd9d4;height:100%}
.mbar-soon{background:#f0dc80;height:100%}
.mbar-urgent{background:#f5b8b8;height:100%}
.member-detail{display:flex;align-items:center;gap:8px;font-size:9.5px;color:var(--text-light);flex-shrink:0;width:220px}
.busy-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap}
.busy-high{background:var(--red-bg);color:var(--red)}
.busy-mid{background:var(--yellow-bg);color:var(--yellow)}
.busy-low{background:#f0f8f0;color:var(--green)}
.busy-none{background:var(--tag);color:var(--text-light)}

/* Dashboard toggle button in header */
.dash-toggle{padding:4px 11px;border-radius:6px;border:1px solid var(--border);font-size:10px;font-weight:600;cursor:pointer;background:#fff;color:var(--text-mid)}
.dash-toggle.active{background:var(--text);border-color:var(--text);color:#fff}

/* Setup overlay */
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:200}
.setup-card{background:#fff;border-radius:12px;padding:28px;max-width:540px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.15);max-height:90vh;overflow-y:auto}
.setup-card h2{font-size:17px;margin-bottom:14px}
.setup-card .step{margin-bottom:10px;font-size:11.5px;line-height:1.8;color:var(--text-mid)}
.setup-card .step b{color:var(--text)}
.setup-card code{background:#eae8e4;padding:1px 4px;border-radius:3px;font-size:10.5px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const NOW=new Date(),DAY=86400000;

function mkFeat(n,t){return{id:"f_"+Math.random().toString(36).slice(2,7),name:n,tasks:t};}
function mkTask(n,a,d,done){return{id:"t_"+Math.random().toString(36).slice(2,7),name:n,assignee:a,deadline:d,done:!!done};}

const SAMPLE=[
  {id:"p1",productName:"業務効率化プラットフォーム",
   members:["田中","佐藤","鈴木","山田"],
   roles:[{role:"リーダー",name:"田中"},{role:"エンジニア",name:"佐藤"},{role:"エンジニア",name:"鈴木"},{role:"デザイナー",name:"山田"}],
   budget:"5,000,000",
   features:[
    mkFeat("ユーザー認証",[mkTask("ログイン画面UI","田中","04/01",true),mkTask("認証API連携","佐藤","04/03",true),mkTask("パスワードリセット","田中","04/05",true),mkTask("SSO対応","鈴木","04/10",false),mkTask("MFA実装","鈴木","04/15",false),mkTask("セッション管理","田中","04/18",false),mkTask("権限ロール設計","佐藤","04/20",false),mkTask("監査ログ","山田","04/25",false)]),
    mkFeat("ダッシュボード",[mkTask("レイアウト設計","山田","04/01",true),mkTask("グラフ部品","佐藤","04/04",true),mkTask("リアルタイム更新","鈴木","04/05",false),mkTask("フィルター機能","山田","04/18",false),mkTask("KPIカード","田中","04/20",false),mkTask("期間選択UI","佐藤","04/22",false),mkTask("CSVエクスポート","山田","04/28",false),mkTask("ウィジェット保存","鈴木","05/02",false)]),
    mkFeat("自動化エンジン",[mkTask("ワークフロー定義","鈴木","03/28",true),mkTask("トリガー設定","田中","04/03",false),mkTask("アクション実行","佐藤","04/12",false),mkTask("ログ監視","鈴木","04/30",false),mkTask("エラー再試行","田中","05/05",false),mkTask("スケジュール実行","山田","05/08",false),mkTask("条件分岐","佐藤","05/12",false),mkTask("テンプレ保存","鈴木","05/15",false)]),
    mkFeat("設定・管理",[mkTask("ユーザー管理","山田","03/30",true),mkTask("権限設定","田中","04/02",false),mkTask("通知設定","佐藤","04/08",false),mkTask("統合テスト","山田","04/30",false),mkTask("API鍵管理","鈴木","05/01",false),mkTask("請求設定","田中","05/05",false),mkTask("ブランド設定","佐藤","05/10",false),mkTask("データ削除","山田","05/15",false)]),
    mkFeat("レポート",[mkTask("レポート設計","佐藤","04/10",true),mkTask("PDF出力","山田","04/15",false),mkTask("定期配信","田中","04/22",false),mkTask("カスタム集計","鈴木","04/28",false),mkTask("比較分析","佐藤","05/02",false),mkTask("共有リンク","山田","05/08",false),mkTask("アノテーション","田中","05/12",false),mkTask("履歴閲覧","鈴木","05/15",false)]),

// ═══ Data conversion ═══
function projectsToRows(projects){
  const rows=[];
  projects.forEach(p=>{
    // Meta row for project-level info
    rows.push({"プロジェクト":p.productName,"機能":"__META__","タスクID":"","タスク名":"",
      "担当者":JSON.stringify({members:p.members||[],roles:p.roles||[],budget:p.budget||""}),"締切":"","完了":""});
    p.features.forEach(f=>{f.tasks.forEach(t=>{
      rows.push({"プロジェクト":p.productName,"機能":f.name,"タスクID":t.id,"タスク名":t.name,"担当者":t.assignee||"","締切":fmtDl(t.deadline)||t.deadline||"","完了":t.done?"TRUE":"FALSE"});
    });});
  });
  return rows;
}
function rowsToProjects(rows){
  const pMap={},pOrder=[];
  for(const row of rows){
    const pName=(row["プロジェクト"]||"").trim();if(!pName)continue;
    if(!pMap[pName]){pMap[pName]={id:"p_"+Math.random().toString(36).slice(2,7),productName:pName,features:[],_fMap:{},members:[],roles:[],budget:""};pOrder.push(pName);}
    const p=pMap[pName];
    const fName=(row["機能"]||"").trim();
    if(fName==="__META__"){
      try{const m=JSON.parse(row["担当者"]||"{}");p.members=m.members||[];p.roles=m.roles||[];p.budget=m.budget||"";}catch{}
      continue;
    }
    if(!fName)continue;
    if(!p._fMap[fName]){const f={id:"f_"+Math.random().toString(36).slice(2,7),name:fName,tasks:[]};p._fMap[fName]=f;p.features.push(f);}
    p._fMap[fName].tasks.push({id:(row["タスクID"]||"").trim()||"t_"+Math.random().toString(36).slice(2,7),name:(row["タスク名"]||"").trim(),assignee:(row["担当者"]||"").trim(),deadline:(row["締切"]||"").trim(),done:(row["完了"]||"").trim().toUpperCase()==="TRUE"});
  }
  return pOrder.map(n=>{const p=pMap[n];delete p._fMap;return p;}).filter(p=>p.features.length>0)||null;
}

// ═══ Google Sheets API ═══
function gasGetJsonp(url){return new Promise((res,rej)=>{const cb="_mc_"+Date.now();const s=document.createElement("script");const c=()=>{delete window[cb];s.remove();};const t=setTimeout(()=>{c();rej(new Error("タイムアウト"));},10000);window[cb]=d=>{clearTimeout(t);c();res(d);};s.onerror=()=>{clearTimeout(t);c();rej(new Error("読込失敗"));};s.src=url+(url.includes("?")?"&":"?")+"callback="+cb;document.body.appendChild(s);});}
async function gasFetchGet(url){const r=await fetch(url,{redirect:"follow"});const t=await r.text();let j;try{j=JSON.parse(t);}catch{const m=t.match(/\{[\s\S]*\}/);if(m)try{j=JSON.parse(m[0]);}catch{}}if(!j)throw new Error("解析失敗");if(!j.success)throw new Error(j.error||"GASエラー");return j;}
async function gasFetchPost(url,body){const r=await fetch(url,{method:"POST",redirect:"follow",body:JSON.stringify(body)});const t=await r.text();let j;try{j=JSON.parse(t);}catch{const m=t.match(/\{[\s\S]*\}/);if(m)try{j=JSON.parse(m[0]);}catch{}}if(!j)throw new Error("解析失敗");if(!j.success)throw new Error(j.error||"GASエラー");return j;}
const _isHttp=location.protocol.startsWith("http");
async function gasGet(url){if(_isHttp){try{return await gasFetchGet(url);}catch(e){return await gasGetJsonp(url);}}else{try{return await gasGetJsonp(url);}catch{return await gasFetchGet(url);}}}

async function loadFromSheet(silent){
  if(!S.gasUrl){setState({saveStatus:"offline"});return;}
  try{
    S.saveStatus="saving";S.lastError="";render();
    const d=await gasGet(S.gasUrl);_gasConnected=true;
    if(d.rows&&d.rows.length>0){const loaded=rowsToProjects(d.rows);if(loaded&&loaded.length>0){S.projects=loaded;if(!S.projects.find(p=>p.id===S.activeProjectId))S.activeProjectId=S.projects[0].id;}}
    else{setState({saveStatus:"saved",lastSaved:new Date(),lastError:""});await saveToSheet();return;}
    setState({saveStatus:"saved",lastSaved:new Date(),lastError:""});
  }catch(e){console.error("Load:",e);if(silent)setState({saveStatus:"offline",lastError:""});else setState({saveStatus:"error",lastError:"読込失敗: "+e.message});}
}
// 保存インジケータだけをDOM直接更新（フル再レンダリング不要）
function patchSaveIndicator(){
  const el=document.querySelector('.save-indicator');if(!el)return;
  const saveLabel={saved:"保存済み",saving:"同期中...",error:"エラー",offline:"ローカル"};
  el.className='save-indicator '+S.saveStatus;
  el.title=S.lastError||"";
  el.onclick=S.saveStatus==="error"?()=>setState({showSetup:true}):null;
  el.innerHTML='';
  const dot=document.createElement('span');dot.className='save-dot';el.appendChild(dot);
  el.appendChild(document.createTextNode(
    S.saveStatus==="error"&&S.lastError?S.lastError:
    S.saveStatus==="saved"&&S.lastSaved?(saveLabel.saved+" "+S.lastSaved.toLocaleTimeString("ja-JP")):
    (saveLabel[S.saveStatus]||"")));
}
async function saveToSheet(){
  if(!S.gasUrl){S.saveStatus="offline";patchSaveIndicator();return;}
  try{
    S.saveStatus="saving";S.lastError="";
    patchSaveIndicator();
    await gasFetchPost(S.gasUrl,{rows:projectsToRows(S.projects)});
    _gasConnected=true;
    S.saveStatus="saved";S.lastSaved=new Date();S.lastError="";
    patchSaveIndicator();
    // 入力中でなければフル再レンダリング（プログレスバー等の更新）
    if(!document.activeElement||!document.activeElement.closest('.edit-panel')){render();}
  }catch(e){
    console.error("Save:",e);
    S.saveStatus="error";S.lastError="保存失敗: "+e.message;
    patchSaveIndicator();
  }
}
function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  if(!S.gasUrl)return;
  S.saveStatus="saving";
  patchSaveIndicator();
  saveTimer=setTimeout(()=>saveToSheet(),2000);
}

// ── Helpers ──
function parseDeadline(dl){
  if(!dl)return null;
  const s=dl.trim();
  // MM/DD format
  const p=s.split("/").map(Number);
  if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1])&&p[0]>=1&&p[0]<=12)return new Date(NOW.getFullYear(),p[0]-1,p[1],23,59,59);
  // Full date string from Google Sheets
  const d=new Date(s);
  if(!isNaN(d.getTime()))return d;
  return null;
}
// Format deadline for display: always show MM/DD
function fmtDl(dl){
  if(!dl)return"";
  const s=dl.trim();
  if(/^\d{1,2}\/\d{1,2}$/.test(s))return s;
  const d=new Date(s);
  if(!isNaN(d.getTime()))return(d.getMonth()+1)+"/"+(d.getDate());
  return s.slice(0,5);
}
function deadlineClass(t){if(t.done)return"done";const dt=parseDeadline(t.deadline);if(!dt)return"";const d=dt-NOW;if(d<7*DAY)return"urgent";if(d<14*DAY)return"soon";return"";}
function featPct(f){const t=f.tasks.length,d=f.tasks.filter(x=>x.done).length;return{total:t,done:d,pct:t?Math.round(d/t*100):0};}
function projectPct(p){let t=0,d=0;p.features.forEach(f=>{t+=f.tasks.length;d+=f.tasks.filter(x=>x.done).length;});return t?Math.round(d/t*100):0;}

// ── DOM ──
function h(tag,props,...kids){const el=document.createElement(tag);if(props)for(const k in props){if(k==="className")el.className=props[k];else if(k==="style"&&typeof props[k]==="object")Object.assign(el.style,props[k]);else if(k==="innerHTML")el.innerHTML=props[k];else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),props[k]);else if(props[k]!=null)el.setAttribute(k,props[k]);}kids.flat().forEach(k=>{if(k==null||k===false)return;el.appendChild(typeof k==="string"||typeof k==="number"?document.createTextNode(k):k);});return el;}

function renameMember(oldName,newName){
  const p=ap();const idx=p.members.indexOf(oldName);if(idx<0)return;
  if(!newName||newName===oldName){S.editingMember=null;S.editMemberVal="";render();return;}
  if(p.members.includes(newName)){alert("その名前はすでに登録されています");return;}
  p.members[idx]=newName;
  p.features.forEach(f=>f.tasks.forEach(t=>{if(t.assignee===oldName)t.assignee=newName;}));
  (p.roles||[]).forEach(r=>{if(r.name===oldName)r.name=newName;});
  if(S.selectedHolder===oldName)S.selectedHolder=newName;
  S.editingMember=null;S.editMemberVal="";

}

  const legend=h("div",{style:{display:"flex",gap:"12px",fontSize:"9px",color:"var(--text-light)",marginBottom:"8px",alignItems:"center"}});
  [["#b8b5af","完了"],["#dbd9d4","通常"],["#f0dc80","2週間以内"],["#f5b8b8","1週間以内"]].forEach(([c,l])=>{
    legend.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"3px"}},
      h("div",{style:{width:"10px",height:"10px",borderRadius:"2px",background:c,flexShrink:"0"}}),l));
  });
  table.appendChild(legend);

  Object.entries(mMap).sort(([,a],[,b])=>{
    const ta=a.done+a.normal+a.soon+a.urgent, tb=b.done+b.normal+b.soon+b.urgent;
    return tb-ta;
  }).forEach(([name,s])=>{
    const total=s.done+s.normal+s.soon+s.urgent;
    if(total===0)return;
    const remaining=total-s.done;
    // 忙殺率: 残タスク中、締切が迫っているものの比率（urgent=重み2, soon=重み1）
    const busyScore=remaining>0?Math.min(100,Math.round((s.urgent*2+s.soon)/(remaining*2)*100)):0;
    const busyCls=busyScore>=60?"busy-high":busyScore>=30?"busy-mid":busyScore>0?"busy-low":"busy-none";
    const busyLabel=busyScore>=60?"高":busyScore>=30?"中":busyScore>0?"低":"−";

    const row=h("div",{className:"member-row"});
    row.appendChild(h("div",{className:"member-label"},name));
    const bw=h("div",{className:"member-bar-wrap"});
    if(s.done>0)bw.appendChild(h("div",{className:"mbar-done",style:{width:(s.done/total*100)+"%"},title:"完了 "+s.done+"件"}));
    if(s.normal>0)bw.appendChild(h("div",{className:"mbar-normal",style:{width:(s.normal/total*100)+"%"},title:"通常 "+s.normal+"件"}));
    if(s.soon>0)bw.appendChild(h("div",{className:"mbar-soon",style:{width:(s.soon/total*100)+"%"},title:"2週間以内 "+s.soon+"件"}));
    if(s.urgent>0)bw.appendChild(h("div",{className:"mbar-urgent",style:{width:(s.urgent/total*100)+"%"},title:"1週間以内 "+s.urgent+"件"}));
    row.appendChild(bw);
    const detail=h("div",{className:"member-detail"});
    detail.appendChild(h("span",{},s.done+"/"+total+" タスク"));
    if(s.urgent>0)detail.appendChild(h("span",{style:{color:"var(--red)",fontWeight:"600"}},"🔴"+s.urgent));
    if(s.soon>0)detail.appendChild(h("span",{style:{color:"var(--yellow)",fontWeight:"600"}},"🟡"+s.soon));
    detail.appendChild(h("span",{className:"busy-badge "+busyCls},"忙殺率 "+busyLabel+" "+busyScore+"%"));
    row.appendChild(detail);
    table.appendChild(row);
  });
  sec2.appendChild(table);
  dash.appendChild(sec2);
  return dash;
}

function renderCenterBlock(){
  const p=ap();const blk=h("div",{className:"block center"});
  const pos=[0,1,2,3,null,4,5,6,7];
  for(let i=0;i<9;i++){
    if(i===4){
      blk.appendChild(h("div",{className:"cell prod-cell",onClick:()=>{S.renamingTab=p.id;S.renameVal=p.productName;render();}},
        h("div",{className:"prod-name"},p.productName),h("div",{className:"prod-pct"},projectPct(p)+"%")));
    }else{
      const f=p.features[pos[i]];if(!f){blk.appendChild(h("div",{className:"cell"}));continue;}
      const{pct,done,total}=featPct(f);
      blk.appendChild(h("div",{className:"cell feat-cell"+(done===total&&total>0?" complete":""),onClick:()=>setState({editFeatId:f.id,editTaskId:null})},
        h("div",{className:"fc-name"},f.name),h("div",{className:"fc-bottom"},h("div",{className:"fc-pct"},pct+"%"),h("div",{className:"fc-bar"},h("div",{className:"fc-bar-fill",style:{width:pct+"%"}})))));
    }
  }
  return blk;
}

function renderOuterBlock(feat){
  const{done,total}=featPct(feat);const blk=h("div",{className:"block"+(done===total&&total>0?" all-done":"")});
  const pos=[0,1,2,3,null,4,5,6,7];
  for(let i=0;i<9;i++){
    if(i===4){
      blk.appendChild(h("div",{className:"cell feat-label"},h("div",{className:"feat-name"},feat.name),h("div",{className:"feat-pct"},done+"/"+total)));
    }else{
      const t=feat.tasks[pos[i]];
      if(!t||!t.name||!t.name.trim()){
        // 空白セル：クリックで新規タスク追加 or 既存の空タスクを編集
        const emptyCell=h("div",{className:"cell cell-empty",onClick:()=>{
          if(!t){
            const nt=mkTask("","","",false);
            feat.tasks.push(nt);
            scheduleSave();
            setState({editTaskId:nt.id,editFeatId:null});
          }else{
            setState({editTaskId:t.id,editFeatId:null});
          }
        }});
        blk.appendChild(emptyCell);
        continue;
      }
      const cls=deadlineClass(t);
      const hl=S.selectedHolder&&t.assignee===S.selectedHolder;
      const dm=S.selectedHolder&&t.assignee!==S.selectedHolder;
      const cell=h("div",{className:"cell task "+(t.done?"done ":"")+cls+(hl?" highlighted":"")+(dm?" dimmed":""),
        onClick:()=>setState({editTaskId:t.id,editFeatId:null}),title:t.name});
      // Checkbox: stop propagation so it doesn't open edit panel
      const chk=h("div",{className:"task-check",onClick:e=>{e.stopPropagation();toggleTask(t.id);}},t.done?"✓":"");
      cell.appendChild(chk);
      cell.appendChild(h("div",{className:"task-name",style:{paddingLeft:"18px"}},t.name));
      cell.appendChild(h("div",{className:"task-meta"},h("span",{className:"assignee"},t.assignee||""),h("span",{className:"deadline"},fmtDl(t.deadline))));
      blk.appendChild(cell);
    }
  }
  return blk;
}

function renderMandala(){
  const m=h("div",{className:"mandala"});const p=ap();
  const pos=[0,1,2,3,null,4,5,6,7];
  for(let i=0;i<9;i++){
    if(i===4)m.appendChild(renderCenterBlock());
    else{const f=p.features[pos[i]];if(!f){m.appendChild(h("div",{className:"block"}));continue;}m.appendChild(renderOuterBlock(f));}
  }
  return m;
}

function renderEditPanel(){
  const panel=h("div",{className:"edit-panel"});
  if(!S.editTaskId&&!S.editFeatId){
    panel.appendChild(h("div",{className:"edit-panel-empty"},
      h("div",{className:"ep-icon"},"⊞"),
      h("div",{},"タスクまたは機能を\nクリックして編集")));
    return panel;
  }
  panel.appendChild(h("button",{className:"close",onClick:()=>setState({editTaskId:null,editFeatId:null})},"×"));
  const p=ap();
  if(S.editTaskId){
    const found=findTask(S.editTaskId);if(!found){S.editTaskId=null;return null;}
    const{task:t,feat:f}=found;
    panel.appendChild(h("h3",{},"タスク編集"));
    panel.appendChild(h("div",{style:{fontSize:"10px",color:"var(--text-light)",marginBottom:"6px"}},"所属: "+f.name));
    // Each input does NOT trigger full re-render; only updates data + schedules save
    const mkInp=(label,key)=>{
      const row=h("div",{className:"edit-row"});row.appendChild(h("label",{},label));
      const inp=h("input",{value:t[key]||""});
      inp.addEventListener("input",e=>{updateTaskField(t.id,key,e.target.value);});
      inp.addEventListener("change",()=>scheduleSave());
      row.appendChild(inp);return row;
    };
    panel.appendChild(mkInp("タスク名","name"));
    // Assignee dropdown
    const aRow=h("div",{className:"edit-row"});aRow.appendChild(h("label",{},"担当者"));
    const sel=h("select",{});
    sel.appendChild(h("option",{value:""},"(未割当)"));
    (p.members||[]).forEach(m=>{const o=h("option",{value:m},m);if(m===t.assignee)o.selected=true;sel.appendChild(o);});
    sel.addEventListener("change",e=>{updateTaskField(t.id,"assignee",e.target.value);scheduleSave();render();});
    aRow.appendChild(sel);panel.appendChild(aRow);
    panel.appendChild(mkInp("締切 (MM/DD)","deadline"));
    const dRow=h("div",{className:"edit-row"});dRow.appendChild(h("label",{},"ステータス"));
    dRow.appendChild(h("button",{className:"btn"+(t.done?" primary":""),onClick:()=>toggleTask(t.id)},t.done?"✓ 完了済み":"未完了"));
    panel.appendChild(dRow);
  }else if(S.editFeatId){
    const f=p.features.find(x=>x.id===S.editFeatId);if(!f){S.editFeatId=null;return null;}
    const{done,total,pct}=featPct(f);
    panel.appendChild(h("h3",{},"機能編集"));
    const row=h("div",{className:"edit-row"});row.appendChild(h("label",{},"機能名"));
    const inp=h("input",{value:f.name});
    inp.addEventListener("input",e=>{updateFeatField(f.id,"name",e.target.value);});
    inp.addEventListener("change",()=>scheduleSave());
    row.appendChild(inp);panel.appendChild(row);
    panel.appendChild(h("div",{style:{padding:"8px 10px",background:"var(--tag)",borderRadius:"6px",fontSize:"10.5px",color:"var(--text-mid)"}},"進捗: "+done+"/"+total+" ("+pct+"%)"));
    panel.appendChild(h("h3",{style:{marginTop:"8px"}},"タスク一覧"));
    f.tasks.forEach((t,idx)=>{
      panel.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"6px",padding:"5px 6px",background:t.done?"var(--done-bg)":"#fbfaf8",borderRadius:"5px",fontSize:"10.5px",cursor:"pointer"},
        onClick:()=>setState({editTaskId:t.id,editFeatId:null})},
        h("span",{style:{width:"14px",height:"14px",borderRadius:"3px",border:"1px solid var(--border)",background:t.done?"var(--text)":"#fff",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",flexShrink:"0",cursor:"pointer"},onClick:e=>{e.stopPropagation();toggleTask(t.id);}},t.done?"✓":""),
        h("span",{style:{flex:"1",textDecoration:t.done?"line-through":"none",color:t.done?"var(--done-tx)":"var(--text)"}},t.name),
        h("span",{style:{fontSize:"9px",color:"var(--text-light)"}},t.assignee)));
    });
  }
  return panel;
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const c=h("div",{className:"app"});
  c.appendChild(renderTabBar());
  const saveLabel={saved:"保存済み",saving:"同期中...",error:"エラー",offline:"ローカル"};
  c.appendChild(h("div",{className:"header"},
    h("div",{className:"header-left"},
      h("div",{style:{width:"22px",height:"22px",borderRadius:"4px",background:"var(--tag)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"var(--text-mid)"}},"⊞"),
      "プロダクト進捗マンダラ",
      h("div",{className:"save-indicator "+S.saveStatus,title:S.lastError||"",onClick:()=>{if(S.saveStatus==="error")setState({showSetup:true});}},
        h("span",{className:"save-dot"}),
        S.saveStatus==="error"&&S.lastError?S.lastError:S.saveStatus==="saved"&&S.lastSaved?(saveLabel.saved+" "+S.lastSaved.toLocaleTimeString("ja-JP")):(saveLabel[S.saveStatus]||""))
    ),
    h("div",{className:"header-right"},
      h("div",{className:"legend"},
        h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:"var(--red-bg)",border:"1px solid var(--red-border)"}}),"1週間以内"),
        h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:"var(--yellow-bg)",border:"1px solid var(--yellow-border)"}}),"2週間以内"),
        h("div",{className:"legend-item"},h("span",{className:"legend-dot",style:{background:"var(--done-bg)",border:"1px solid var(--border)"}}),"完了")),
      S.selectedHolder?h("span",{style:{padding:"2px 8px",background:"var(--tag)",borderRadius:"10px",fontSize:"9.5px",fontWeight:"600"}},S.selectedHolder+" のタスク"):null,
      h("button",{className:"dash-toggle"+(S.view==="dashboard"?" active":""),onClick:()=>setState({view:S.view==="dashboard"?"mandala":"dashboard"}),title:"ダッシュボード/マンダラ切替"},"📊 ダッシュボード"),
      h("button",{className:"btn",onClick:()=>setState({showSetup:true})},"⚙ 設定"))
  ));
  const body=h("div",{className:"body-row"});
  if(S.view==="dashboard"){
    body.appendChild(renderDashboard());
  }else{
    c.appendChild(renderProjectInfo());
    body.appendChild(renderSidebar());
    const stage=h("div",{className:"stage"});const wrap=h("div",{className:"mandala-wrap"});
    wrap.appendChild(renderMandala());stage.appendChild(wrap);body.appendChild(stage);
    body.appendChild(renderEditPanel());
  }
  c.appendChild(body);app.appendChild(c);
  const so=renderSetupOverlay();if(so)app.appendChild(so);
}

function renderSetupOverlay(){
  if(!S.showSetup)return null;
  const card=h("div",{className:"setup-card"});
  card.appendChild(h("h2",{},"⚙ スプレッドシート接続設定"));
  card.appendChild(h("div",{className:"step",innerHTML:`<b>1.</b> Google スプレッドシートを作成<br><b>2.</b> <b>拡張機能 → Apps Script</b><br><b>3.</b> コードを貼り付けて保存<br><b>4.</b> <b>デプロイ → 新しいデプロイ → ウェブアプリ</b><br>&nbsp;&nbsp;&nbsp;アクセス: <b>全員</b> / 実行: <b>自分</b><br><b>5.</b> URLを下に貼り付け`}));
  const urlRow=h("div",{style:{display:"flex",gap:"8px",marginTop:"14px"}});
  const urlInp=h("input",{type:"text",value:S.gasUrl,placeholder:"ウェブアプリURLを貼り付け...",style:{flex:"1",fontSize:"12px",padding:"8px 10px",border:"1px solid var(--border)",borderRadius:"6px",outline:"none"}});
  urlInp.addEventListener("input",e=>{S.gasUrl=e.target.value;});
  urlRow.appendChild(urlInp);
  urlRow.appendChild(h("button",{onClick:()=>{localStorage.setItem("mandalaGasUrl",S.gasUrl);setState({showSetup:false});if(S.gasUrl)loadFromSheet(false);},style:{padding:"8px 16px",borderRadius:"8px",border:"none",background:"var(--text)",color:"#fff",fontSize:"11px",fontWeight:"600",whiteSpace:"nowrap"}},"接続する"));
  card.appendChild(urlRow);
  if(S.lastError)card.appendChild(h("div",{style:{marginTop:"8px",padding:"6px 10px",borderRadius:"6px",background:"var(--red-bg)",border:"1px solid var(--red-border)",fontSize:"10.5px",color:"var(--red)"}},"⚠ "+S.lastError));
  if(_gasConnected)card.appendChild(h("div",{style:{marginTop:"8px",padding:"6px 10px",borderRadius:"6px",background:"#f0f8f0",border:"1px solid #c0e0c0",fontSize:"10.5px",color:"var(--green)"}},"✓ 接続済み"));
  card.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:"12px"}},
    h("button",{onClick:()=>setState({showSetup:false}),style:{background:"none",border:"none",color:"var(--text-light)",fontSize:"10.5px",cursor:"pointer"}},"スキップ"),
    h("button",{onClick:()=>{S.gasUrl="";localStorage.removeItem("mandalaGasUrl");_gasConnected=false;setState({showSetup:false,saveStatus:"offline",lastError:""});},style:{background:"none",border:"none",color:"var(--red)",fontSize:"10.5px",cursor:"pointer"}},"接続を解除")));
  return h("div",{className:"setup-overlay"},card);
}

render();
if(S.gasUrl)loadFromSheet(true);
</script>
